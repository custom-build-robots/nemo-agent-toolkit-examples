llms:
  ollama_llm:
    _type: openai
    api_key: "EMPTY"
    base_url: "http://192.168.2.57:11434/v1"
    model_name: "qwen3.5:4b"   # z. B. qwen2.5:7b-instruct
    temperature: 0.0
    max_retries: 3
    # Agent-Workflows brauchen ein größeres Context-Window als der Ollama-Default
    num_ctx: 26384

functions:
  current_datetime:
    _type: current_datetime

workflow:
  _type: react_agent
  tool_names: [current_datetime]
  llm_name: ollama_llm
  verbose: true
  parse_agent_response_max_retries: 3
  system_prompt: |
    Du bist ein hilfsbereiter deutschsprachiger Sprachassistent.
    WICHTIG: Antworte AUSSCHLIESSLICH auf Deutsch – auch deine Thoughts.
    Antworte dem Nutzer in HÖCHSTENS EINEM kurzen Satz, ohne Aufzählungen
    oder Listen, da deine Antwort laut vorgelesen wird.
    Du hast Zugriff auf die folgenden Tools:
    {tools}
    Verwende exakt dieses Format:
    Question: die Eingabefrage
    Thought: überlege auf Deutsch, was zu tun ist
    Action: eine der folgenden Aktionen - [{tool_names}]
    Action Input: die Eingabe für die Aktion
    Observation: das Ergebnis der Aktion
    ... (Zyklus kann sich wiederholen)
    Thought: Ich kenne jetzt die finale Antwort
    Final Answer: die finale Antwort auf Deutsch, in einem kurzen Satz
    Beginne!
  verbose: true
