# =============================================================================
# Experiment 3: Multi-Agent Supervisor Pattern
# =============================================================================
# Three specialized ReAct agents (research, system, time) coordinated by a
# top-level supervisor agent. Each specialist has its own toolset and its own
# system prompt. The supervisor sees the specialists as "tools" and decides
# which one to delegate to.
#
# Companion blog post:
#   https://ai-box.eu/large-language-models/nemo-agent-toolkit-multi-agent/
#
# IMPORTANT: Requires a larger model than Qwen 2.5 7B.
#   Qwen 2.5 7B is too small for the supervisor pattern and produces empty
#   LLM output under cognitive load. Use Qwen 3.6 27B or comparable.
#
#   ollama pull qwen3.6:27b
#
# Run:
#   nat run --config_file experiment3_multi_agent.yml \
#     --input "Wie spät ist es, wie ist meine GPU ausgelastet, und wer war Konrad Zuse?"
# =============================================================================

llms:
  ollama_llm:
    _type: openai
    api_key: "EMPTY"
    base_url: "http://localhost:11434/v1"
    model_name: "qwen3.6:27b"
    temperature: 0.0
    max_retries: 3
    # num_ctx widens Ollama's context window beyond its small default (~2-4K).
    # Multi-agent prompts grow long quickly; without this, the LLM may return
    # empty output and ReAct parsing fails.
    extra_body:
      options:
        num_ctx: 16384

functions:
  # -------------------------------------------------------------------------
  # Basic tools used by the specialist agents below
  # -------------------------------------------------------------------------
  current_datetime:
    _type: current_datetime

  wikipedia_search:
    _type: wiki_search
    max_results: 3

  gpu_status:
    _type: gpu_status

  # -------------------------------------------------------------------------
  # Specialist agents — each one is a complete ReAct loop with its own tools
  # -------------------------------------------------------------------------
  research_agent:
    _type: react_agent
    tool_names: [wikipedia_search]
    llm_name: ollama_llm
    description: |
      An expert agent for research questions. Use this agent when the user
      asks about historical events, famous people, scientific concepts,
      geographical facts, or any factual knowledge that can be answered
      with Wikipedia.
    system_prompt: |
      Du bist ein Recherche-Spezialist.
      Antworte AUSSCHLIESSLICH auf Deutsch.

      Du hast Zugriff auf:
      {tools}

      Verwende folgendes Format:
      Question: die Frage
      Thought: überlege auf Deutsch
      Action: eines von [{tool_names}]
      Action Input: ein Suchbegriff
      Observation: das Ergebnis
      Thought: Ich kenne die Antwort
      Final Answer: eine prägnante Antwort auf Deutsch

      Beginne!
    verbose: true
    parse_agent_response_max_retries: 3

  system_agent:
    _type: react_agent
    tool_names: [gpu_status]
    llm_name: ollama_llm
    description: |
      A specialist agent for the AI inference server's hardware status.
      Use this agent when the user asks about GPU utilization, GPU memory,
      temperature, power consumption, or whether the server is currently
      busy with inference work.
    system_prompt: |
      Du bist ein Systemstatus-Spezialist für KI-Infrastruktur.
      Antworte AUSSCHLIESSLICH auf Deutsch.

      Du hast Zugriff auf:
      {tools}

      Verwende folgendes Format:
      Question: die Frage
      Thought: überlege auf Deutsch
      Action: eines von [{tool_names}]
      Action Input: {{}}
      Observation: das Ergebnis
      Thought: Ich kenne die Antwort
      Final Answer: eine fundierte Antwort auf Deutsch

      Beginne!
    verbose: true
    parse_agent_response_max_retries: 3

  time_agent:
    _type: react_agent
    tool_names: [current_datetime]
    llm_name: ollama_llm
    description: |
      A specialist agent for date and time queries. Use this agent when the
      user asks about the current time, current date, day of the week, or
      any time-related context.
    system_prompt: |
      Du bist ein Zeit-Spezialist.
      Antworte AUSSCHLIESSLICH auf Deutsch.

      Du hast Zugriff auf:
      {tools}

      Verwende folgendes Format:
      Question: die Frage
      Thought: überlege auf Deutsch
      Action: eines von [{tool_names}]
      Action Input: {{}}
      Observation: das Ergebnis
      Thought: Ich kenne die Antwort
      Final Answer: eine knappe Antwort auf Deutsch

      Beginne!
    verbose: true
    parse_agent_response_max_retries: 3

# -----------------------------------------------------------------------------
# Supervisor — the top-level workflow that delegates to specialists
# -----------------------------------------------------------------------------
workflow:
  _type: react_agent
  tool_names: [research_agent, system_agent, time_agent]
  llm_name: ollama_llm
  system_prompt: |
    Du bist ein Supervisor-Agent, der Anfragen an die passenden Spezialisten weiterleitet.
    Antworte AUSSCHLIESSLICH auf Deutsch.

    Du hast Zugriff auf drei Spezialisten-Agenten:

    {tools}

    Wähle für jede Anfrage den passenden Spezialisten. Wenn die Anfrage
    mehrere Themen kombiniert (z. B. Zeit UND Hardware), darfst du
    mehrere Spezialisten nacheinander aufrufen.

    Verwende folgendes Format:
    Question: die Frage
    Thought: überlege auf Deutsch, welcher Spezialist passt
    Action: eines von [{tool_names}]
    Action Input: die konkrete Frage an den Spezialisten
    Observation: die Antwort des Spezialisten
    Thought: Brauche ich noch einen Spezialisten?
    Final Answer: eine konsolidierte Antwort auf Deutsch

    Beginne!
  verbose: true
  parse_agent_response_max_retries: 3
