# =============================================================================
# Experiment 3: Multi-Agent Supervisor Pattern (v2 — debugged)
# =============================================================================
# CHANGES vs. v1:
#   1. Sub-agents NO LONGER have custom system_prompts. They use NAT's default
#      English ReAct prompt, which integrates correctly with the conversation
#      history templating. The sub-agents now reliably produce Final Answers
#      after their tool calls.
#   2. Only the supervisor has a custom German system_prompt — that's where
#      the user-facing language is decided.
#   3. The supervisor's prompt now explicitly tells it the JSON-object format
#      for sub-agent calls: {"input_message": "..."} — avoids a wasted retry
#      on the first supervisor → sub-agent invocation.
#   4. The supervisor's prompt instructs it to translate sub-agent answers
#      from English to German when synthesizing the final answer.
#
# IMPORTANT: Requires a larger model than Qwen 2.5 7B.
#   ollama pull qwen3.6:27b
#
# Run:
#   nat run --config_file experiment3_multi_agent.yml \
#     --input "Wie spät ist es, wie ist meine GPU ausgelastet, und wer war Konrad Zuse?"
# =============================================================================

llms:
  ollama_llm:
    _type: openai
    api_key: "EMPTY"
    base_url: "http://localhost:11434/v1"
    model_name: "qwen3.6:27b"
    temperature: 0.0
    max_retries: 3
    extra_body:
      options:
        num_ctx: 16384

functions:
  # -------------------------------------------------------------------------
  # Basic tools used by the specialist agents below
  # -------------------------------------------------------------------------
  current_datetime:
    _type: current_datetime

  wikipedia_search:
    _type: wiki_search
    max_results: 3

  gpu_status:
    _type: gpu_status

  # -------------------------------------------------------------------------
  # Specialist agents — using NAT's DEFAULT system_prompt (English).
  # Only the `description:` matters for the supervisor's tool selection.
  # The sub-agents produce English Final Answers; the supervisor translates
  # the consolidated answer into German for the user.
  # -------------------------------------------------------------------------
  research_agent:
    _type: react_agent
    tool_names: [wikipedia_search]
    llm_name: ollama_llm
    description: |
      An expert agent for research questions. Use this agent when the user
      asks about historical events, famous people, scientific concepts,
      geographical facts, or any factual knowledge that can be answered
      with Wikipedia.
    verbose: true
    parse_agent_response_max_retries: 3

  system_agent:
    _type: react_agent
    tool_names: [gpu_status]
    llm_name: ollama_llm
    description: |
      A specialist agent for the AI inference server's hardware status.
      Use this agent when the user asks about GPU utilization, GPU memory,
      temperature, power consumption, or whether the server is currently
      busy with inference work.
    verbose: true
    parse_agent_response_max_retries: 3

  time_agent:
    _type: react_agent
    tool_names: [current_datetime]
    llm_name: ollama_llm
    description: |
      A specialist agent for date and time queries. Use this agent when the
      user asks about the current time, current date, day of the week, or
      any time-related context.
    verbose: true
    parse_agent_response_max_retries: 3

# -----------------------------------------------------------------------------
# Supervisor — German system prompt, explicit input format hint, translation
# -----------------------------------------------------------------------------
workflow:
  _type: react_agent
  tool_names: [research_agent, system_agent, time_agent]
  llm_name: ollama_llm
  system_prompt: |
    Du bist ein Supervisor-Agent, der Anfragen an die passenden Spezialisten
    weiterleitet. Die finale Antwort an den Benutzer MUSS auf Deutsch sein.

    Du hast Zugriff auf drei Spezialisten-Agenten:

    {tools}

    WICHTIG — Format der Action Input für Spezialisten:
    Spezialisten-Agenten erwarten ein JSON-Objekt mit dem Schlüssel
    "input_message". Beispiel:
        Action Input: {{"input_message": "Wie spät ist es?"}}

    Die Spezialisten antworten möglicherweise auf Englisch. Übersetze und
    konsolidiere deren Antworten in deiner finalen Antwort auf Deutsch.

    Wenn die Anfrage mehrere Themen kombiniert, rufe mehrere Spezialisten
    nacheinander auf.

    Verwende folgendes Format:

    Question: die Frage
    Thought: überlege auf Deutsch, welcher Spezialist passt
    Action: eines von [{tool_names}]
    Action Input: {{"input_message": "die konkrete Frage an den Spezialisten"}}
    Observation: die Antwort des Spezialisten
    Thought: Brauche ich noch einen weiteren Spezialisten?
    Final Answer: eine konsolidierte Antwort auf Deutsch

    Beginne!
  verbose: true
  parse_agent_response_max_retries: 3
